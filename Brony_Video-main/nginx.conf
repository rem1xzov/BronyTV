server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Сжатие Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    client_max_body_size 500M;

    # Основной роутинг фронтенда (React SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование всех запросов к API на правильное имя контейнера бэкенда
    location /api/ {
        proxy_pass http://brony-backend:5000; # БЕЗ слэша на конце, так как бэк ждет /api/
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Раздача медиа-файлов и стриминг видео
    location /videos/ {
        proxy_pass http://brony-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
    }

    # Остальные системные пути бэкенда (если используются напрямую)
    location /season/ { proxy_pass http://brony-backend:5000; }
    location /video/ { proxy_pass http://brony-backend:5000; }
    location /content/ { proxy_pass http://brony-backend:5000; }

    # Старые пути из прошлых билдов
    location /api/content/ {
        rewrite ^/api/content/(.*)$ /content/$1 break;
        proxy_pass http://brony-backend:5000;
    }
}
