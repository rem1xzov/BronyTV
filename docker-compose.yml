services:
  db:
    image: postgres:16-alpine
    container_name: brony-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: BronyTV
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d BronyTV"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      brony-net:
        aliases:
          - db

  backend:
    build:
      context: .
      dockerfile: BronyTV/Dockerfile
    container_name: brony-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./media:/app/media:ro
    environment:
      DISABLE_HTTPS_REDIRECT: "true"
      ASPNETCORE_ENVIRONMENT: Production
      VideoStorage__RootPath: /app/media
      BRONYTV_VIDEOS_ROOT: /app/media
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=BronyTV;Username=postgres;Password=${POSTGRES_PASSWORD:-123456}"
      Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:8080}
    restart: unless-stopped
    networks:
      brony-net:
        aliases:
          - backend

  frontend:
    build:
      context: .
      dockerfile: Brony_Video-main/Dockerfile
      args:
        REACT_APP_API_BASE_URL: /api
        REACT_APP_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: brony-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"
    restart: always
    networks:
      brony-net:
        aliases:
          - frontend

networks:
  brony-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
