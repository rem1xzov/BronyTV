services:
  backend:
    build:
      context: ./BronyTV
      dockerfile: Dockerfile
    container_name: brony-backend
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./Brony_Video-main
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: http://backend:5000
    container_name: brony-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
