server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Сжатие Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    client_max_body_size 500M;

    # Внутренний DNS докера и ПРАВИЛЬНОЕ имя бэкенда из docker-compose
    resolver 127.0.0.11 valid=5s;
    set $upstream_backend http://brony-backend:5000;

    # 1. Запросы к API бэкенда
    location /api/ {
        proxy_pass $upstream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    
    # Легаси-заглушка для двойного префикса /api/api/
    location /api/api/ {
        proxy_pass $upstream_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 2. Роуты бэкенда для сезонов и контента
    location /season/ {
        proxy_pass $upstream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /video/ {
        proxy_pass $upstream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Стриминг видеофайлов (без буферизации, чтобы плеер не тупил)
    location /videos/ {
        proxy_pass $upstream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
    }

    location /content/ {
        proxy_pass $upstream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy URLs from older frontend builds (/api/content/* -> static wwwroot).
    location /api/content/ {
        rewrite ^/api/content/(.*)$ /content/$1 break;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. ГЛАВНОЕ ИСПРАВЛЕНИЕ: Раздача самого фронтенда (React SPA)
    location / {
        # Сначала ищем реальный CSS/JS файл. Если его нет — отдаем index.html.
        # Больше никакой ложной пересылки запросов на бэкенд вместо страниц сайта!
        try_files $uri $uri/ /index.html =404;
    }
}
