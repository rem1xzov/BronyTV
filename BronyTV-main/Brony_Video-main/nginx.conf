server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Сжатие Gzip 
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    client_max_body_size 500M;

    # DNS Докера и имя контейнера бэка
    resolver 127.0.0.11 valid=5s;
    set $upstream_backend http://brony-backend:5000;

    # Заглушка для фавикона, чтобы не насиловать бэкенд ошибками 503
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # ОБЩИЙ И ЧИСТЫЙ ПРОКСИ ДЛЯ API
    # proxy_pass со слэшем на конце корректно передает хвост запроса в .NET
    location /api/ {
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    
    # Роуты контроллеров бэка (если они завязаны без префикса /api/)
    location /season/ {
        proxy_pass $upstream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /video/ {
        proxy_pass $upstream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Стриминг видео (буферизация отключена, чтобы плеер не зависал)
    location /videos/ {
        proxy_pass $upstream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
    }

    location /content/ {
        proxy_pass $upstream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy URLs
    location /api/content/ {
        rewrite ^/api/content/(.*)$ /content/$1 break;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Раздача фронтенда (React SPA)
    location / {
        # Ищет физический файл css/js на диске. Если не находит (запрос роута типа /me),
        # то отдает index.html, чтобы React сам разрулил роутинг.
        try_files $uri $uri/ /index.html =404;
    }
}
