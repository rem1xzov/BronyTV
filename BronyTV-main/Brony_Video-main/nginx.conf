events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Сжатие Gzip (чтобы тяжелые CSS и JS файлы не отваливались по таймауту)
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        gzip_proxied any;
        gzip_vary on;
        gzip_comp_level 6;
        gzip_buffers 16 8k;
        gzip_http_version 1.1;

        client_max_body_size 500M;

        # Внутренний DNS Docker (valid=1s лечит проблему, когда сайт не открывался с первого раза)
        resolver 127.0.0.11 valid=1s ipv6=off;
        set $upstream_backend http://brony-backend:5000;

        # Заглушка для фавикона, чтобы Nginx не слал эти запросы на бэк и не выдавал 503
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }

        # 1. Основной прокси для API бэкенда (автоматически отрезает /api/ при передаче в .NET)
        location /api/ {
            proxy_pass $upstream_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
        
        # Легаси-заглушка для двойного префикса /api/api/
        location /api/api/ {
            proxy_pass $upstream_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # 2. Роуты контроллеров .NET (сезоны и контент)
        location /season/ {
            proxy_pass $upstream_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /video/ {
            proxy_pass $upstream_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Стриминг видеофайлов (буферизация отключена, чтобы плеер на сайте не зависал)
        location /videos/ {
            proxy_pass $upstream_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
        }

        location /content/ {
            proxy_pass $upstream_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Legacy URL-адреса старых сборок фронтенда (/api/content/* -> static wwwroot)
        location /api/content/ {
            rewrite ^/api/content/(.*)$ /content/$1 break;
            proxy_pass $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Раздача фронтенда (React SPA)
        location / {
            # Если файл css/js существует на диске — отдаем его. 
            # Если это роут фронта (например /me или /season) — отдаем index.html.
            try_files $uri $uri/ /index.html =404;
        }
    }
}
